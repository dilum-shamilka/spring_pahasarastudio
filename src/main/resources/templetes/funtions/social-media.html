<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pahasara Studio | Simple View</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --accent: #c5a059;
            --bg-dark: #0f0f0f;
            --card-bg: #161616;
            --whatsapp: #25D366;
        }

        body {
            background: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: #000;
            border-bottom: 1px solid #222;
            padding: 1rem 2rem;
        }

        .navbar-brand {
            color: var(--accent) !important;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- Social Grid --- */
        .card-simple {
            border-radius: 12px;
            border: 1px solid #222;
            background: var(--card-bg);
            transition: all 0.3s ease;
            text-decoration: none;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            height: 100%;
            font-weight: 600;
        }

        .card-simple:hover {
            border-color: var(--accent);
            background: #1c1c1c;
            color: var(--accent);
            transform: translateY(-3px);
        }

        .card-simple:hover .fa-whatsapp { color: var(--whatsapp); }

        /* --- Music Room --- */
        .music-room-simple {
            background: #000;
            border: 1px solid #333;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            margin-top: 2rem;
        }

        .studio-dot {
            width: 10px;
            height: 10px;
            background: #ff4d4d;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 10px #ff4d4d;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .album-art-simple {
            width: 220px;
            max-width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        .btn-accent {
            background: var(--accent);
            border: none;
            color: #000 !important;
            font-weight: 700;
            border-radius: 10px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-accent:hover {
            background: #d4b47a;
            transform: translateY(-2px);
        }

        .iframe-container {
            background: #111;
            border-radius: 50px;
            padding: 5px;
            border: 1px solid #222;
            overflow: hidden;
        }

        /* --- RESPONSIVE MEDIA QUERIES --- */

        /* Laptop Large (Max 1440px) */
        @media (max-width: 1440px) {
            /* Custom 5-column layout */
            .col-lg-5-cols { flex: 0 0 auto; width: 20%; }
        }

        /* Laptop (Max 1024px) */
        @media (max-width: 1024px) {
            .container { padding: 0 6%; }
            .music-room-simple { padding: 30px; }
        }

        /* Tablet (Max 768px) */
        @media (max-width: 768px) {
            .col-lg-5-cols { width: 33.33%; } /* 3 columns on tablet */

            .music-room-simple {
                text-align: center;
                border-radius: 15px;
            }

            .music-room-simple .row {
                flex-direction: column;
            }

            .music-room-simple .ps-md-5 {
                padding-left: 0 !important;
                margin-top: 20px;
            }

            .album-art-simple {
                width: 180px;
            }

            .btn-accent {
                width: 100%; /* Full width buttons on mobile/tablet */
            }
        }

        /* Mobile Large (Max 425px) */
        @media (max-width: 425px) {
            .navbar { padding: 1rem; }
            .navbar-brand { font-size: 1.1rem; }

            .col-lg-5-cols { width: 50%; } /* 2 columns on mobile */

            .music-room-simple {
                padding: 20px;
                margin-top: 1rem;
            }

            h2 { font-size: 1.5rem; }
            .fs-5 { font-size: 1rem !important; }
        }

        /* Mobile Small (Max 320px) */
        @media (max-width: 320px) {
            .col-lg-5-cols { width: 100%; } /* 1 column on tiny screens */

            .card-simple { padding: 15px; font-size: 0.9rem; }

            .album-art-simple { width: 140px; }
        }
    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">PAHASARA STUDIO</a>
        <div class="d-flex align-items-center">
            <span class="badge rounded-pill bg-dark border border-secondary text-secondary me-3 d-none d-sm-inline">
                <i class="fas fa-circle text-success me-1" style="font-size: 8px;"></i> Studio Online
            </span>
            <a href="landing.html" class="btn btn-outline-secondary btn-sm">
                <i class="fas fa-arrow-left me-1"></i> Back
            </a>
        </div>
    </div>
</nav>

<div class="container py-5">

    <div class="row g-3 mb-5 justify-content-center">
        <div class="col-6 col-md-4 col-lg-5-cols">
            <a href="https://facebook.com" target="_blank" class="card-simple">
                <i class="fab fa-facebook-f me-2"></i> Facebook
            </a>
        </div>
        <div class="col-6 col-md-4 col-lg-5-cols">
            <a href="https://instagram.com" target="_blank" class="card-simple">
                <i class="fab fa-instagram me-2"></i> Instagram
            </a>
        </div>
        <div class="col-6 col-md-4 col-lg-5-cols">
            <a href="https://tiktok.com" target="_blank" class="card-simple">
                <i class="fab fa-tiktok me-2"></i> TikTok
            </a>
        </div>
        <div class="col-6 col-md-4 col-lg-5-cols">
            <a href="https://wa.me/94728262003" target="_blank" class="card-simple">
                <i class="fab fa-whatsapp me-2"></i> WhatsApp
            </a>
        </div>
        <div class="col-6 col-md-4 col-lg-5-cols">
            <a href="https://drive.google.com" target="_blank" class="card-simple">
                <i class="fas fa-hdd me-2"></i> Storage
            </a>
        </div>
    </div>

    <div class="row">
        <div class="col-xl-9 col-lg-11 mx-auto">
            <div class="music-room-simple">
                <div class="mb-4">
                    <span class="small text-secondary fw-bold text-uppercase" style="letter-spacing: 2px;">
                        <span class="studio-dot"></span> Live Session
                    </span>
                </div>

                <div class="row align-items-center">
                    <div class="col-md-4 mb-4 mb-md-0 text-center">
                        <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=400&h=400&fit=crop"
                             class="album-art-simple img-fluid" alt="Island Fusion Mix Cover">
                    </div>

                    <div class="col-md-8 ps-md-5">
                        <h2 class="fw-bold mb-1">Island Fusion Mix</h2>
                        <p class="text-secondary mb-4 fs-5">Underground English & Sinhala Grooves</p>

                        <div class="iframe-container mb-4">
                            <iframe width="100%" height="60" scrolling="no" frameborder="no" allow="autoplay"
                                    src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/1256336449&color=%23c5a059&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false&visual=false">
                            </iframe>
                        </div>

                        <a href="https://soundcloud.com/discover" target="_blank" class="btn btn-accent px-5 py-3">
                            <i class="fas fa-play-circle me-2"></i> OPEN PLAYLIST
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<footer class="text-center py-5 text-secondary">
    <hr class="w-25 mx-auto mb-4 border-secondary opacity-25">
    <small class="text-uppercase" style="letter-spacing: 1px;">PAHASARA STUDIO &copy; 2026</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
