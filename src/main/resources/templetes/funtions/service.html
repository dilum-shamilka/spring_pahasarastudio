<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pahasara Studio | Photographer Services</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    /* --- Base Styles --- */
    body {
      background-color: #f4f7f6;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding-bottom: 50px;
    }

    .main-card {
      border: none;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      margin-bottom: 30px;
    }

    .status-badge {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .bg-active { background-color: #d1e7dd; color: #0f5132; }
    .bg-inactive { background-color: #f8d7da; color: #842029; }

    .btn-action { width: 110px; }

    /* --- ENHANCED RESPONSIVENESS (Matching your style) --- */

    /* Laptop (Max 1024px) */
    @media (max-width: 1024px) {
      .container { padding: 0 6%; }
    }

    /* Tablet (Max 768px) */
    @media (max-width: 768px) {
      .container { margin-top: 2rem !important; }
      h2 { font-size: 1.5rem; text-align: center; }

      .btn-action {
        width: 100%;
        margin-left: 0 !important;
        margin-bottom: 8px;
      }

      .d-flex.gap-2 {
        flex-direction: column;
      }
    }

    /* Mobile View: Table to Cards (Max 576px) */
    @media (max-width: 576px) {
      .table-responsive { border: none; }

      /* Hide Headers */
      thead { display: none; }

      /* Row becomes a card */
      #serviceTableBody tr {
        display: block;
        margin-bottom: 1.5rem;
        background: #fff;
        border: 1px solid #dee2e6;
        border-radius: 12px;
        padding: 10px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.02);
      }

      /* Cells become flex rows */
      #serviceTableBody td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        text-align: right;
        border: none;
        padding: 10px 12px;
        border-bottom: 1px solid #f1f1f1;
      }

      /* Labels */
      #serviceTableBody td::before {
        content: attr(data-label);
        font-weight: 700;
        text-transform: uppercase;
        font-size: 0.75rem;
        color: #6c757d;
        text-align: left;
      }

      /* Actions Cell */
      #serviceTableBody td:last-child {
        border-bottom: none;
        justify-content: center;
        gap: 20px;
        padding-top: 15px;
      }

      #serviceTableBody td:last-child::before {
        content: "";
      }
    }

    /* Mobile Small (Max 320px) */
    @media (max-width: 320px) {
      h2 { font-size: 1.2rem; }
      .main-card { border-radius: 10px; }
    }
  </style>
</head>
<body>

<div class="container mt-5">

  <div class="mb-4">
    <a href="dashboard.html" class="btn btn-outline-primary btn-sm">
      <i class="fas fa-arrow-left me-2"></i> Back to Dashboard
    </a>
  </div>

  <h2 class="mb-4">🎬 Studio Package / Service Management</h2>

  <div class="card main-card mb-4">
    <div class="card-body p-4">
      <form id="serviceForm">
        <input type="hidden" id="serviceId">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label small text-muted fw-bold">Package Name</label>
            <input type="text" id="serviceName" class="form-control shadow-sm" placeholder="e.g. Wedding Gold Package" required>
          </div>
          <div class="col-md-3">
            <label class="form-label small text-muted fw-bold">Price (LKR)</label>
            <input type="number" step="0.01" id="price" class="form-control shadow-sm" placeholder="50000.00" required>
          </div>
          <div class="col-md-3">
            <label class="form-label small text-muted fw-bold">Availability</label>
            <select id="status" class="form-select shadow-sm">
              <option value="ACTIVE" selected>ACTIVE</option>
              <option value="INACTIVE">INACTIVE</option>
            </select>
          </div>
        </div>
        <div class="mt-3">
          <label class="form-label small text-muted fw-bold">Package Description</label>
          <textarea id="description" class="form-control shadow-sm" rows="2" placeholder="What's included in this package?"></textarea>
        </div>
        <div class="mt-4 d-flex gap-2">
          <button type="submit" class="btn btn-success btn-sm btn-action shadow-sm" id="saveBtn">Save</button>
          <button type="button" class="btn btn-secondary btn-sm btn-action shadow-sm" id="resetBtn">Reset</button>
        </div>
      </form>
    </div>
  </div>

  <div class="card main-card">
    <div class="card-body">
      <h5 class="card-title mb-4">All Packages</h5>
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Package Name</th>
            <th>Price</th>
            <th>Description</th>
            <th>Status</th>
            <th class="text-center">Actions</th>
          </tr>
          </thead>
          <tbody id="serviceTableBody">
          </tbody>
        </table>
        <div id="noData" class="text-center text-muted py-5 d-none">
          <i class="fas fa-box-open fa-2x mb-3"></i>
          <p>No packages found.</p>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="/static/js/service.js"></script>

</body>
</html>
