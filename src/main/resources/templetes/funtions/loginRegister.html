<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pahasara Studio | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #2563eb 100%);
            --bg-color: #f8fafc;
            --card-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
        }
        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 20px; /* Default mobile padding */
        }
        .auth-card {
            background: white;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            width: 100%;
            max-width: 420px;
            transition: all 0.3s ease;
        }
        .brand-logo {
            font-weight: 700;
            font-size: 1.5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            display: block;
            margin-bottom: 0.5rem;
        }
        .form-control, .form-select { border-radius: 12px; padding: 12px; border: 1px solid #e2e8f0; }
        .form-control:focus, .form-select:focus { box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); border-color: #6366f1; }
        .btn-primary {
            border-radius: 12px;
            padding: 12px;
            background: var(--primary-gradient);
            border: none;
            font-weight: 700;
            transition: transform 0.2s;
        }
        .btn-primary:active { transform: scale(0.98); }
        .toggle-link { color: #2563eb; cursor: pointer; font-weight: 700; text-decoration: none; }
        .toggle-link:hover { text-decoration: underline; }

        /* --- RESPONSIVE LOGIC INTEGRATION --- */

        /* Laptop (Max 1024px) */
        @media (max-width: 1024px) {
            body { padding: 40px 6%; }
        }

        /* Tablet (Max 768px) */
        @media (max-width: 768px) {
            .auth-card {
                padding: 2rem;
                max-width: 380px;
            }
            h2 { font-size: 1.5rem; }
        }

        /* Mobile Large (Max 425px) */
        @media (max-width: 425px) {
            body {
                padding: 30px 5%;
                align-items: flex-start; /* Better for long forms on mobile */
                padding-top: 10vh;
            }
            .auth-card {
                padding: 1.5rem;
                border-radius: 18px;
            }
            .brand-logo { font-size: 1.3rem; }
        }

        /* Mobile Small (Max 320px) */
        @media (max-width: 320px) {
            h2 { font-size: 1.25rem; }
            .form-control, .btn-primary { padding: 10px; font-size: 0.9rem; }
            .toggle-link, #hint { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<div class="auth-card">
    <span class="brand-logo">Pahasara Studio</span>
    <h2 class="text-center mb-4" id="title">Login</h2>

    <form id="authForm">
        <div id="signupFields" style="display: none;">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" id="regName" class="form-control" placeholder="John Doe">
            </div>
            <div class="mb-3">
                <label class="form-label">System Role</label>
                <select id="regRole" class="form-select">
                    <option value="ADMIN" selected>ADMIN</option>
                    <option value="RECEPTION">RECEPTION</option>
                    <option value="OWNER">OWNER</option>
                </select>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-4" id="mainBtn">Sign In</button>

        <div class="text-center">
            <span id="hint">Don't have an account?</span>
            <a class="toggle-link" id="toggleMode" onclick="toggle()">Create Account</a>
        </div>
    </form>
</div>

<script>
    let isLogin = true;

    function toggle() {
        isLogin = !isLogin;
        document.getElementById('signupFields').style.display = isLogin ? "none" : "block";
        document.getElementById('title').innerText = isLogin ? "Login" : "Create Account";
        document.getElementById('mainBtn').innerText = isLogin ? "Sign In" : "Register Now";
        document.getElementById('hint').innerText = isLogin ? "Don't have an account?" : "Already a member?";
        document.getElementById('toggleMode').innerText = isLogin ? "Create Account" : "Login";
        document.getElementById('regName').required = !isLogin;
    }

    document.getElementById('authForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('mainBtn');
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const name = document.getElementById('regName').value;
        const role = document.getElementById('regRole').value;

        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            const endpoint = isLogin ? 'login' : 'register';
            const payload = isLogin
                ? { email, password }
                : { name, email, password, role };

            const res = await fetch(`http://localhost:8080/api/v1/auth/${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await res.json();

            if (data.code === "00") {
                if (isLogin) {
                    localStorage.setItem("jwt_token", data.content);
                    localStorage.setItem("userEmail", email);
                    window.location.href = "dashboard.html";
                } else {
                    alert("Account Created as " + role + " successfully! Please login.");
                    toggle();
                }
            } else {
                alert("Error: " + (data.message || "Invalid credentials"));
            }
        } catch (err) {
            alert("Connection Failed! Ensure backend is running.");
            console.error(err);
        } finally {
            btn.disabled = false;
            btn.innerText = isLogin ? "Sign In" : "Register Now";
        }
    });
</script>
</body>
</html>
