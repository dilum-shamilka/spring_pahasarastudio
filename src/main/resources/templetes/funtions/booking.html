<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pahasara Studio | Booking Management</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-bottom: 50px; }
    .main-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 30px; }
    .btn-action { width: 110px; }
    table.table tbody tr:hover { background-color: rgba(0,0,0,0.03); transition: background-color 0.2s; }
    table.table td, table.table th { vertical-align: middle; }
    .card-header-custom { font-weight: 600; background-color: #fff; border-bottom: 1px solid #eee; padding: 1.25rem; border-radius: 15px 15px 0 0; display: flex; justify-content: space-between; align-items: center; }

    /* Stats Styling */
    .total-badge { background: #0d6efd; color: white; padding: 8px 15px; border-radius: 10px; font-weight: bold; display: inline-flex; align-items: center; }

    @media (max-width: 768px) { .btn-action { width: 100%; margin-bottom: 5px; } }
  </style>
</head>
<body>

<div class="container mt-5">
  <div class="mb-3 d-flex gap-2 flex-wrap">
    <a href="dashboard.html" class="btn btn-outline-primary btn-sm"><i class="fas fa-arrow-left me-1"></i> Back to Dashboard</a>
    <a href="client.html" class="btn btn-outline-info btn-sm"><i class="fas fa-user me-1"></i> Back to Client Management</a>
    <a href="email.html" class="btn btn-outline-success btn-sm"><i class="fas fa-envelope me-1"></i> Email History</a>
    <a href="invoice.html" class="btn btn-outline-warning btn-sm"><i class="fas fa-file-invoice-dollar me-1"></i> Invoices</a>
  </div>

  <h2 class="mb-4">📅 Booking Management</h2>

  <div class="card main-card mb-4">
    <div class="card-header-custom"><h5 class="mb-0">Booking Details</h5></div>
    <div class="card-body">
      <form id="bookingForm">
        <input type="hidden" id="bookingId">
        <div class="row g-3">
          <div class="col-md-3">
            <label class="form-label small fw-bold">Booking Date</label>
            <input type="date" id="bookingDate" class="form-control" required>
          </div>
          <div class="col-md-3">
            <label class="form-label small fw-bold">Service Package</label>
            <select id="serviceId" class="form-select" required>
              <option value="" selected disabled>Select a Package</option>
            </select>
          </div>
          <div class="col-md-3">
            <label class="form-label small fw-bold">Location</label>
            <input type="text" id="location" class="form-control" placeholder="City/Venue" required>
          </div>
          <div class="col-md-3">
            <label class="form-label small fw-bold">Client Email</label>
            <input type="email" id="clientEmail" class="form-control" placeholder="example@mail.com" required>
          </div>
          <div class="col-md-3">
            <label class="form-label small fw-bold">Status</label>
            <select id="status" class="form-select">
              <option value="PENDING">PENDING</option>
              <option value="CONFIRMED">CONFIRMED</option>
              <option value="CANCELLED">CANCELLED</option>
            </select>
          </div>
        </div>
        <div class="mt-4">
          <button type="submit" class="btn btn-success btn-sm btn-action" id="saveBtn">Save</button>
          <button type="button" class="btn btn-secondary btn-sm btn-action" id="resetBtn">Reset</button>
        </div>
      </form>
    </div>
  </div>

  <div class="card main-card mb-4">
    <div class="card-body py-3">
      <div class="row align-items-center">
        <div class="col-md-5">
          <label class="form-label small fw-bold text-muted mb-1"><i class="fas fa-calendar-alt me-1"></i> Filter Bookings by Month</label>
          <div class="input-group">
            <input type="month" id="filterMonth" class="form-control form-control-sm">
            <button class="btn btn-primary btn-sm px-3" type="button" id="btnFilterMonth">Get Bookings</button>
            <button class="btn btn-outline-secondary btn-sm" type="button" id="btnClearMonth">Clear</button>
          </div>
        </div>
        <div class="col-md-7 text-md-end mt-3 mt-md-0">
          <div class="total-badge shadow-sm">
            <i class="fas fa-check-circle me-2"></i>
            Confirmed This Month: <span id="monthlyTotal" class="ms-2">0</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card main-card">
    <div class="card-header-custom"><h5 class="mb-0">All Bookings</h5></div>
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-bordered table-striped align-middle">
          <thead class="table-dark">
          <tr>
            <th>ID</th><th>Date</th><th>Package</th><th>Location</th><th>Status</th><th>Client Email</th><th class="text-center">Actions</th>
          </tr>
          </thead>
          <tbody id="bookingTableBody"></tbody>
        </table>
      </div>
      <div id="noData" class="text-center text-muted py-4 d-none">No bookings found.</div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  $(document).ready(function() {

    $('#btnFilterMonth').on('click', function() {
      const selectedValue = $('#filterMonth').val(); // YYYY-MM
      if (!selectedValue) {
        alert("Please select a month first!");
        return;
      }
      filterTableByMonth(selectedValue);
    });

    $('#btnClearMonth').on('click', function() {
      $('#filterMonth').val('');
      $('#bookingTableBody tr').show();
      $('#noData').addClass('d-none');
      updateTotal(true); // Reset total to show all confirmed if clear
    });

    function filterTableByMonth(monthStr) {
      let found = false;
      let confirmedCount = 0;

      $('#bookingTableBody tr').each(function() {
        const rowDate = $(this).find('td:eq(1)').text();
        const rowStatus = $(this).find('td:eq(4)').text().trim().toUpperCase();

        if (rowDate.startsWith(monthStr)) {
          $(this).show();
          found = true;
          // Increment total ONLY if status is CONFIRMED
          if (rowStatus === "CONFIRMED") {
            confirmedCount++;
          }
        } else {
          $(this).hide();
        }
      });

      $('#monthlyTotal').text(confirmedCount);
      if (!found) $('#noData').removeClass('d-none');
      else $('#noData').addClass('d-none');
    }

    // Optional: Function to update total when no filter is applied
    function updateTotal(reset = false) {
      let count = 0;
      $('#bookingTableBody tr').each(function() {
        const rowStatus = $(this).find('td:eq(4)').text().trim().toUpperCase();
        if (rowStatus === "CONFIRMED" && ($(this).is(':visible') || reset)) {
          count++;
        }
      });
      $('#monthlyTotal').text(count);
    }
  });
</script>

<script src="/static/js/booking.js"></script>
</body>
</html>
