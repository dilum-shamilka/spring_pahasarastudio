<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pahasara Studio | File Sender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

    <style>
        /* --- BASE STYLES --- */
        body {
            background-color: #f4f7f6;
            padding: 50px 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .card {
            border-radius: 15px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .drop-zone {
            border: 2px dashed #bbb;
            padding: 30px;
            border-radius: 10px;
            background: #f9f9f9;
            text-align: center;
            transition: all .3s ease;
            cursor: pointer;
        }

        .drop-zone:hover {
            border-color: #0d6efd;
            background: #f0f7ff;
        }

        .btn-primary {
            border-radius: 10px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        /* --- RESPONSIVE MEDIA QUERIES --- */

        /* Laptop/Desktop (Large Screens) */
        @media (min-width: 992px) {
            .container { max-width: 1100px; }
        }

        /* Tablet (Max 768px) */
        @media (max-width: 768px) {
            body { padding: 20px 0; }
            .card { margin: 0 15px; }

            section { padding: 20px 4%; }

            .btn-action {
                width: 100%;
                margin-bottom: 10px;
            }

            h3 { font-size: 1.5rem; }
        }

        /* Mobile Large (Max 425px) */
        @media (max-width: 425px) {
            .container { margin-top: 1rem !important; }

            .p-5 { padding: 1.5rem !important; } /* Reduce padding on small screens */

            .nav-buttons { text-align: center; }
            .nav-buttons a { width: 100%; margin-bottom: 10px; }

            /* Form adjustments */
            .form-label { font-size: 0.9rem; }

            /* Button & Input sizing */
            .btn-primary { padding: 12px !important; font-size: 1rem; }

            /* Ensure text doesn't overflow */
            h3 { font-size: 1.3rem; }
        }

        /* Mobile Small (Max 320px) */
        @media (max-width: 320px) {
            h3 { font-size: 1.1rem; }
            .drop-zone { padding: 15px; }
            .drop-zone small { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center">
    <div class="card p-5 w-100" style="max-width: 700px;">
        <h3 class="mb-4 text-primary text-center">
            <i class="fas fa-paperclip me-2"></i>Send Booking Files
        </h3>

        <div id="alertBox"></div>

        <form id="fileForm">
            <div class="mb-3">
                <label class="form-label fw-bold">Client Email</label>
                <input type="email" id="toEmail" class="form-control" placeholder="client@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Subject</label>
                <input type="text" id="subject" class="form-control" placeholder="Your Wedding Gallery - Pahasara Studio" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Message</label>
                <textarea id="message" class="form-control" rows="4" placeholder="Write your message here..." required></textarea>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Attachments</label>
                <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
                    <input type="file" id="fileInput" class="form-control d-none" multiple required onchange="updateFileName(this)">
                    <i class="fas fa-cloud-upload-alt fa-2x text-muted mb-2"></i>
                    <p class="mb-0" id="fileCountText">Click or Drag files to upload</p>
                    <small class="text-muted d-block mt-2">Multiple files supported</small>
                </div>
            </div>
            <button type="submit" id="submitBtn" class="btn btn-primary w-100 p-3">
                <i class="fas fa-paper-plane me-2"></i>Send Email with Files
            </button>
        </form>
    </div>
</div>

<script>
    // Helper to show selected file count
    function updateFileName(input) {
        const text = document.getElementById("fileCountText");
        const count = input.files.length;
        text.innerText = count > 0 ? `${count} file(s) selected` : "Click or Drag files to upload";
        text.classList.add("text-primary", "fw-bold");
    }

    document.getElementById("fileForm").addEventListener("submit", function(e) {
        e.preventDefault();

        const btn = document.getElementById("submitBtn");
        const alertBox = document.getElementById("alertBox");
        const token = localStorage.getItem("jwt_token");

        if (!token) {
            alertBox.innerHTML = `
                <div class="alert alert-warning">
                    <strong>Session Missing!</strong> Please <a href="index/index.html">login</a> to send files.
                </div>`;
            return;
        }

        const formData = new FormData();
        formData.append("toEmail", document.getElementById("toEmail").value);
        formData.append("subject", document.getElementById("subject").value);
        formData.append("message", document.getElementById("message").value);

        const files = document.getElementById("fileInput").files;
        for (let i = 0; i < files.length; i++) {
            formData.append("files", files[i]);
        }

        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> Sending...`;
        alertBox.innerHTML = "";

        fetch("http://localhost:8080/api/v1/email/send", {
            method: "POST",
            headers: { "Authorization": `Bearer ${token}` },
            body: formData
        })
            .then(async res => {
                if (res.ok) {
                    alertBox.innerHTML = '<div class="alert alert-success">✨ Email and files sent successfully!</div>';
                    document.getElementById("fileForm").reset();
                    document.getElementById("fileCountText").innerText = "Click or Drag files to upload";
                } else if (res.status === 403 || res.status === 401) {
                    throw new Error("Your session has expired. Please log in again.");
                } else {
                    const errText = await res.text();
                    throw new Error(errText || "Something went wrong on the server.");
                }
            })
            .catch(err => {
                alertBox.innerHTML = `<div class="alert alert-danger"><strong>Error:</strong> ${err.message}</div>`;
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-paper-plane me-2"></i>Send Email with Files`;
            });
    });
</script>

</body>
</html>
