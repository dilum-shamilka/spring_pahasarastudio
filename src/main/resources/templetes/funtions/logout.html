<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logged Out | Pahasara Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 20px; /* Default padding for mobile */
    }

    .logout-card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 400px;
      transition: all 0.3s ease;
    }

    .icon-circle {
      width: 70px;
      height: 70px;
      background-color: #f1f5f9;
      color: #3b82f6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 1.8rem;
    }

    .btn-primary {
      background-color: #3b82f6;
      border: none;
      border-radius: 12px;
      font-weight: 500;
      transition: 0.3s;
    }

    .btn-primary:hover {
      background-color: #2563eb;
      transform: translateY(-2px);
    }

    /* --- RESPONSIVE LOGIC INTEGRATION --- */

    /* Laptop (Max 1024px) */
    @media (max-width: 1024px) {
      body { padding: 40px 6%; }
    }

    /* Tablet (Max 768px) */
    @media (max-width: 768px) {
      .logout-card {
        padding: 30px 25px;
        max-width: 350px;
      }
      h3 { font-size: 1.5rem; }
    }

    /* Mobile Large (Max 425px) */
    @media (max-width: 425px) {
      body { padding: 30px 5%; }

      .logout-card {
        padding: 25px 20px;
        border-radius: 15px;
      }

      .icon-circle {
        width: 60px;
        height: 60px;
        font-size: 1.5rem;
      }
    }

    /* Mobile Small (Max 320px) */
    @media (max-width: 320px) {
      h3 { font-size: 1.3rem; }
      .btn-primary { font-size: 0.9em; }
      .text-muted { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

<div class="logout-card">
  <div class="icon-circle"><i class="fas fa-sign-out-alt"></i></div>
  <h3 class="fw-bold">Logged Out</h3>
  <p class="text-muted">You have been safely logged out of the Pahasara Studio System.</p>

  <div class="alert alert-light border-0 small py-2 mb-4">
    Redirecting to login in <span id="seconds" class="fw-bold text-primary">5</span> seconds...
  </div>

  <a href="../index/index.html" class="btn btn-primary w-100 py-2">
    Login Again Now
  </a>
</div>

<script>
  let timeLeft = 5;
  const timerElement = document.getElementById('seconds');

  // Clear security tokens while preserving other data
  localStorage.removeItem("jwt_token");
  localStorage.removeItem("token");
  localStorage.removeItem("jwtToken");

  const countdown = setInterval(() => {
    timeLeft--;
    if (timerElement) timerElement.textContent = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(countdown);
      // Redirect to your landing/login page
      window.location.replace("landing.html");
    }
  }, 1000);
</script>
</body>
</html>
