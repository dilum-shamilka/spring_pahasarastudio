<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pahasara Studio | Welcome</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-dark: #0f172a;
      --accent-gold: #d4a373;
      --accent-gold-hover: #bc8a5f;
    }

    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background-color: var(--primary-dark);
      overflow-x: hidden; /* Prevent horizontal scroll */
    }

    /* ================= NAVBAR ================= */
    .navbar {
      position: fixed;
      width: 100%;
      top: 0;
      padding: 15px 0;
      z-index: 1000;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(15, 23, 42, 0.6); /* Slightly more opaque for readability */
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .navbar-brand {
      font-weight: 800;
      color: white !important;
      font-size: clamp(1.1rem, 4vw, 1.5rem); /* Responsive font size */
      letter-spacing: 1px;
    }

    .brand-accent {
      color: var(--accent-gold) !important;
    }

    /* ================= HERO SECTION ================= */
    .hero-section {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      padding: 100px 20px 60px; /* Top padding ensures space for navbar */
    }

    .hero-section::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      /* Gradient overlay improved for text readability on mobile */
      background: linear-gradient(
              to bottom,
              rgba(15, 23, 42, 0.8),
              rgba(15, 23, 42, 0.6),
              rgba(15, 23, 42, 0.9)
      ),
      url('https://images.unsplash.com/photo-1520854221256-17451cc331bf?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
      z-index: -1;
      animation: zoomEffect 20s ease-in-out infinite alternate;
    }

    @keyframes zoomEffect {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }

    /* ================= HERO CONTENT ================= */
    .hero-content {
      opacity: 0;
      animation: fadeUp 1.2s ease-out forwards;
      max-width: 900px;
      margin: 0 auto;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero-content h1 {
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1px;
      /* Responsive fluid heading size */
      font-size: clamp(2rem, 8vw, 4.5rem);
      margin-bottom: 20px;
    }

    .hero-content p {
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      color: #cdd4dd;
      max-width: 650px;
      margin: 0 auto 35px;
      line-height: 1.6;
    }

    /* ================= BUTTONS ================= */
    .btn-get-started {
      padding: clamp(12px, 2vw, 16px) clamp(30px, 4vw, 45px);
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      font-weight: 600;
      border-radius: 50px;
      background-color: var(--accent-gold);
      border: none;
      color: #1a1a1a;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: inline-flex;
      align-items: center;
      box-shadow: 0 4px 20px rgba(212, 163, 115, 0.3);
    }

    .btn-get-started:hover {
      background-color: var(--accent-gold-hover);
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(212, 163, 115, 0.5);
      color: #000;
    }

    .btn-login {
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      font-weight: 500;
      transition: 0.3s;
      color: white !important;
      padding: 8px 25px;
      font-size: 0.9rem;
    }

    .btn-login:hover {
      background: white;
      color: var(--primary-dark) !important;
      border-color: white;
    }

    /* ================= RESPONSIVE ADJUSTMENTS ================= */

    /* Small Mobile (320px - 480px) */
    @media (max-width: 480px) {
      .navbar {
        padding: 10px 0;
      }
      .hero-section {
        padding-top: 80px;
      }
      .btn-login {
        padding: 6px 18px;
        font-size: 0.8rem;
      }
    }

    /* Tablets (Up to 768px) */
    @media (max-width: 768px) {
      .hero-content p {
        margin-bottom: 25px;
      }
    }

    /* Height fix for short screens/landscape mobile */
    @media (max-height: 500px) {
      .hero-section {
        height: auto;
        padding: 120px 20px;
      }
    }
  </style>
</head>

<body>

<nav class="navbar">
  <div class="container d-flex justify-content-between align-items-center">
    <a class="navbar-brand" href="#">
      PAHASARA <span class="brand-accent">STUDIO</span>
    </a>
    <a href="../funtions/loginRegister.html" class="btn btn-login">Login/SignUp</a>
  </div>
</nav>

<section class="hero-section">
  <div class="container hero-content">
    <h1 class="mb-3">
      Capturing Moments,<br>Creating Memories
    </h1>
    <p>
      Elevate your artistry with a seamless management experience. From the first shutter click to the final gallery delivery, manage your passion with precision.
    </p>
    <a href="../funtions/loginRegister.html" class="btn btn-get-started">
      Get Started <i class="bi bi-arrow-right ms-2"></i>
    </a>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
